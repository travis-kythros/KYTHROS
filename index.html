<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KYTHROS — Personal OS & KYTRAC Construction</title>
  <style>
    :root{--amber:#d97706;--blue:#4d8dff}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100vh;background:radial-gradient(circle at top,#0a2146 0%,#071426 36%,#040b14 100%);color:#eaf0fb;font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;display:flex;align-items:center;justify-content:center}
    .wrap{text-align:center;padding:40px 20px;max-width:600px}
    .logo{font-size:3.5rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px}
    .sub{color:#98a7c4;font-size:1rem;margin-bottom:48px;letter-spacing:.04em}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px}
    .card{border-radius:22px;padding:32px 24px;text-decoration:none;display:flex;flex-direction:column;gap:10px;transition:transform .15s,box-shadow .15s}
    .card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
    .card-icon{font-size:2.8rem}
    .card-name{font-size:1.4rem;font-weight:900;color:#fff}
    .card-desc{font-size:.85rem;line-height:1.5;color:rgba(255,255,255,.6)}
    .card-kythros{background:linear-gradient(135deg,rgba(77,141,255,.18),rgba(168,85,247,.12));border:1px solid rgba(77,141,255,.3)}
    .card-kytrac{background:linear-gradient(135deg,rgba(217,119,6,.18),rgba(180,83,9,.12));border:1px solid rgba(217,119,6,.3)}
    .card-name-kythros{color:#bfd6ff}
    .card-name-kytrac{color:#fcd34d}
    .footer{font-size:.75rem;color:rgba(110,145,210,.3);letter-spacing:.06em}
    @media(max-width:480px){.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo" style="background:linear-gradient(135deg,#4d8dff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent">KYTHROS</div>
  <div class="sub">Personal Life OS + Construction Tracking</div>
  <div class="cards">
    <a href="kythros.html" class="card card-kythros">
      <div class="card-icon">⚡</div>
      <div class="card-name card-name-kythros">KYTHROS</div>
      <div class="card-desc">Personal OS — Projects, Family, Calendar, Budget, Notes, Recipes, and KYTHY AI</div>
    </a>
    <a href="kytrac.html" class="card card-kytrac">
      <div class="card-icon">🏗</div>
      <div class="card-name card-name-kytrac">KYTRAC</div>
      <div class="card-desc">Construction Tracking — Track your job from estimate to completion</div>
    </a>
  </div>
  <div class="footer">KYTHROS WORKSPACE · 21/Jun/2026</div>
</div>
</body>
</html>
