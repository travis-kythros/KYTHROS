<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Enterprise Workspace | Calendar & Sync</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  
  <style>
    :root {
      --primary: #2563eb;
      --sidebar-width: 400px;
      --glass-bg: rgba(255, 255, 255, 0.95);
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    }

    /* Reset & Base */
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: var(--bg-gradient);
      overflow: hidden;
    }

    #app-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Sidebar Styling */
    #sidebar {
      width: var(--sidebar-width);
      background: #ffffff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      box-shadow: 10px 0 15px -3px rgba(0, 0, 0, 0.05);
      z-index: 100;
      transition: transform 0.3s ease;
    }

    .sidebar-brand {
      padding: 1.5rem;
      background: var(--primary);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notes-section {
      flex-grow: 1;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      overflow-y: auto;
    }

    #notes-area {
      flex-grow: 1;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 1.25rem;
      font-size: 16px; /* Prevents iPad Auto-Zoom */
      line-height: 1.6;
      background: #fffcf0;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      resize: none;
    }

    #notes-area:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* Main Content Styling */
    #main-view {
      flex-grow: 1;
      padding: 1.5rem;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .calendar-container {
      background: white;
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      height: 100%;
      border: 1px solid #e2e8f0;
    }

    /* Calendar Overrides */
    .fc { --fc-button-bg-color: #2563eb; --fc-button-border-color: #2563eb; height: 100%; }
    .fc .fc-toolbar-title { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .fc-event { cursor: pointer; padding: 2px 5px; border-radius: 4px; }

    /* Custom Status UI */
    .sync-status-pill {
      font-size: 0.7rem;
      padding: 4px 12px;
      border-radius: 100px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .status-synced { background: #dcfce7; color: #166534; }
    .status-pending { background: #fef9c3; color: #854d0e; }
    .status-error { background: #fee2e2; color: #991b1b; }

    /* Loader Overlay */
    #global-loader {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.8);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
      display: none;
    }

    /* Mobile / Tablet Adjustments */
    @media (max-width: 1024px) {
      #app-container { flex-direction: column; }
      #sidebar { width: 100%; height: 35vh; border-right: none; border-bottom: 1px solid #e2e8f0; }
      #main-view { height: 65vh; padding: 1rem; }
    }
  </style>
</head>
<body>

<div id="app-container">
  <aside id="sidebar">
    <div class="sidebar-brand">
      <div>
        <h5 class="mb-0 fw-bold"><i class="fa-solid fa-calendar-check me-2"></i>Workspace</h5>
        <div id="sync-status" class="sync-status-pill status-synced mt-1">System Online</div>
      </div>
      <button class="btn btn-sm btn-light" onclick="forceSync()">
        <i class="fa-solid fa-rotate"></i>
      </button>
    </div>

    <div class="notes-section">
      <div class="d-flex justify-content-between align-items-center">
        <label class="fw-bold text-secondary small">INTERNAL NOTES</label>
        <small id="last-saved" class="text-muted" style="font-size: 0.7rem;">Saved: Just now</small>
      </div>
      <textarea id="notes-area" placeholder="Type here... iPad edits save when you tap away or close the keyboard."></textarea>
      
      <div class="mt-auto pt-3">
        <button class="btn btn-primary w-100 fw-bold py-2" data-bs-toggle="modal" data-bs-target="#addEventModal">
          <i class="fa-solid fa-plus me-2"></i>Create New Event
        </button>
      </div>
    </div>
  </aside>

  <main id="main-view">
    <div id="global-loader">
      <div class="text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 fw-bold text-primary">Refreshing Data...</p>
      </div>
    </div>

    <div class="calendar-container">
      <div id="calendar"></div>
    </div>
  </main>
</div>

<div class="modal fade" id="viewEventModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light">
        <h5 class="modal-title fw-bold" id="viewTitle">Event Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="small text-uppercase fw-bold text-muted">Description</label>
          <p id="viewDescription" class="lead"></p>
        </div>
        <div class="d-flex gap-4">
          <div>
            <label class="small text-uppercase fw-bold text-muted">Start</label>
            <p id="viewStart" class="mb-0"></p>
          </div>
          <div>
            <label class="small text-uppercase fw-bold text-muted">End</label>
            <p id="viewEnd" class="mb-0"></p>
          </div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-danger btn-sm" onclick="handleDelete()">Delete Event</button>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="addEventModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form id="addEventForm">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-bold">New Schedule Entry</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="mb-3">
            <label class="form-label fw-bold small">Event Title</label>
            <input type="text" class="form-control" id="eventTitle" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Date & Time</label>
            <input type="datetime-local" class="form-control" id="eventDateTime" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold small">Description (Optional)</label>
            <textarea class="form-control" id="eventDesc" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary fw-bold">Create Event</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  let calendar;
  let currentEventId = null;
  const notesArea = document.getElementById('notes-area');
  const syncStatus = document.getElementById('sync-status');
  const lastSavedText = document.getElementById('last-saved');
  const loader = document.getElementById('global-loader');

  // 1. INITIALIZATION & REFRESH FIX
  document.addEventListener('DOMContentLoaded', function() {
    initCalendar();
    
    // THE FIX: Immediately fetch data when page finishes loading (Chrome Refresh Fix)
    forceSync();
    loadNotes();

    // IPAD OPTIMIZATION: 
    // Listen for 'blur' (tapping away), 'input' (debounced typing), and 'visibilitychange' (closing app)
    let saveTimeout;
    notesArea.addEventListener('input', () => {
      setSyncStatus('pending', 'Drafting...');
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => saveNotes(notesArea.value), 2000);
    });

    notesArea.addEventListener('blur', () => saveNotes(notesArea.value));
    
    // Backup save for iPads when the browser tab is hidden/closed
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') saveNotes(notesArea.value);
    });
  });

  function initCalendar() {
    const calendarEl = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listWeek'
      },
      themeSystem: 'Bootstrap5',
      height: '100%',
      nowIndicator: true,
      dayMaxEvents: true,
      eventClick: function(info) {
        showViewModal(info.event);
      }
    });
    calendar.render();
  }

  // 2. DATA SYNC (BACKEND COMMUNICATIONS)
  
  function forceSync() {
    toggleLoader(true);
    setSyncStatus('pending', 'Syncing Calendar...');
    
    google.script.run
      .withSuccessHandler(function(events) {
        calendar.removeAllEvents();
        calendar.addEventSource(events);
        setSyncStatus('synced', 'System Online');
        toggleLoader(false);
      })
      .withFailureHandler(function(err) {
        setSyncStatus('error', 'Sync Failed');
        toggleLoader(false);
        Swal.fire('Sync Error', err.message, 'error');
      })
      .getCalendarEvents(); // Must exist in Code.gs
  }

  function saveNotes(content) {
    if (!content) return;
    google.script.run
      .withSuccessHandler(function() {
        const now = new Date();
        lastSavedText.innerText = "Saved: " + now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        setSyncStatus('synced', 'System Online');
      })
      .saveUserNotes(content); // Must exist in Code.gs
  }

  function loadNotes() {
    google.script.run
      .withSuccessHandler(function(content) {
        notesArea.value = content || "";
      })
      .getUserNotes();
  }

  // 3. EVENT CRUD OPERATIONS

  document.getElementById('addEventForm').onsubmit = function(e) {
    e.preventDefault();
    const eventData = {
      title: document.getElementById('eventTitle').value,
      start: document.getElementById('eventDateTime').value,
      description: document.getElementById('eventDesc').value
    };

    toggleLoader(true);
    google.script.run
      .withSuccessHandler(function() {
        bootstrap.Modal.getInstance(document.getElementById('addEventModal')).hide();
        document.getElementById('addEventForm').reset();
        forceSync();
        Swal.fire('Success', 'Event added to Google Calendar', 'success');
      })
      .addEventToGoogle(eventData); // Must exist in Code.gs
  };

  function handleDelete() {
    Swal.fire({
      title: 'Are you sure?',
      text: "This will remove the event from your Google Calendar",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      confirmButtonText: 'Yes, delete it'
    }).then((result) => {
      if (result.isConfirmed) {
        toggleLoader(true);
        google.script.run
          .withSuccessHandler(function() {
            bootstrap.Modal.getInstance(document.getElementById('viewEventModal')).hide();
            forceSync();
            Swal.fire('Deleted!', 'Event removed.', 'success');
          })
          .deleteEventFromGoogle(currentEventId); // Must exist in Code.gs
      }
    });
  }

  // 4. UI HELPERS

  function setSyncStatus(type, text) {
    syncStatus.innerText = text;
    syncStatus.className = 'sync-status-pill ' + 
      (type === 'synced' ? 'status-synced' : type === 'error' ? 'status-error' : 'status-pending');
  }

  function toggleLoader(show) {
    loader.style.display = show ? 'flex' : 'none';
  }

  function showViewModal(event) {
    currentEventId = event.id;
    document.getElementById('viewTitle').innerText = event.title;
    document.getElementById('viewDescription').innerText = event.extendedProps.description || "No description provided.";
    document.getElementById('viewStart').innerText = event.start ? event.start.toLocaleString() : 'N/A';
    document.getElementById('viewEnd').innerText = event.end ? event.end.toLocaleString() : 'N/A';
    new bootstrap.Modal(document.getElementById('viewEventModal')).show();
  }
</script>

</body>
</html>
