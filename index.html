<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KYTHROS">
<meta name="theme-color" content="#0a0c14">
<title>KYTHROS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c14;
  --surface: #111522;
  --surface2: #181d2e;
  --surface3: #1e2440;
  --border: rgba(99,157,255,0.13);
  --border2: rgba(99,157,255,0.28);
  --gold: #c9a84c;
  --gold2: #e8cc7a;
  --gold-dim: rgba(201,168,76,0.15);
  --blue: #639dff;
  --blue2: #4a7de0;
  --muted: rgba(180,190,220,0.5);
  --text: #d8e2f8;
  --text2: rgba(216,226,248,0.7);
  --green: #4ee4a8;
  --amber: #f0a35a;
  --red: #ff6b6b;
  --radius: 10px;
  --radius-sm: 6px;
  --col-todo: #1a2035;
  --col-prog: #1a2535;
  --col-done: #141f1f;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
}

/* ── APP SHELL ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 56px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  gap: 16px;
  position: relative;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.logo-k {
  width: 34px; height: 34px;
  border: 1.5px solid var(--gold);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 16px; font-weight: 700;
  color: var(--gold);
}

.logo-text {
  font-family: 'Cinzel', serif;
  font-size: 16px; font-weight: 600;
  letter-spacing: 0.14em;
  color: var(--gold2);
}

.project-selector {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.project-selector::-webkit-scrollbar { display: none; }

.proj-chip {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 0.5px solid var(--border);
  color: var(--muted);
  background: transparent;
  transition: all 0.2s;
  white-space: nowrap;
}
.proj-chip.active {
  background: rgba(99,157,255,0.12);
  border-color: rgba(99,157,255,0.4);
  color: var(--blue);
}
.proj-chip:hover:not(.active) {
  border-color: var(--border2);
  color: var(--text);
}

.add-proj-btn {
  flex-shrink: 0;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 0.5px dashed var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.add-proj-btn:hover { border-color: var(--gold); color: var(--gold); }

.kythy-btn {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 6px 13px;
  background: var(--gold-dim);
  border: 0.5px solid rgba(201,168,76,0.35);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.kythy-btn:hover { background: rgba(201,168,76,0.25); }
.kythy-pulse {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(0.75)}
}
.kythy-lbl {
  font-family: 'Cinzel', serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--gold2);
}

/* ── KANBAN BOARD ── */
.board {
  flex: 1;
  display: flex;
  gap: 14px;
  padding: 16px 20px 20px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  align-items: stretch;
}
.board::-webkit-scrollbar { display: none; }

.column {
  display: flex;
  flex-direction: column;
  min-width: 280px;
  flex: 1;
  max-width: 400px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.col-header {
  padding: 14px 16px 12px;
  border-bottom: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.col-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.col-title {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  flex: 1;
  color: var(--text2);
}

.col-count {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 8px;
  font-weight: 500;
}

.col-add-btn {
  width: 24px; height: 24px;
  border-radius: 5px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.col-add-btn:hover { border-color: var(--gold); color: var(--gold); }

.cards-area {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.cards-area::-webkit-scrollbar { width: 3px; }
.cards-area::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.card {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 13px;
  cursor: grab;
  transition: border-color 0.2s, transform 0.15s;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
}
.card:active { transform: scale(0.98); }
.card.dragging {
  opacity: 0.4;
  cursor: grabbing;
}
.card.drag-over {
  border-color: var(--blue);
  border-style: dashed;
}

.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 8px;
}

.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

.card-tag {
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 8px;
  font-weight: 500;
  letter-spacing: 0.04em;
}

.card-due {
  font-size: 10px;
  color: var(--muted);
  display: flex; align-items: center; gap: 3px;
  margin-left: auto;
}
.card-due.overdue { color: var(--red); }
.card-due.soon { color: var(--amber); }

.card-priority {
  width: 3px;
  position: absolute;
  left: 0; top: 0; bottom: 0;
  border-radius: 6px 0 0 6px;
}

.card-actions {
  display: none;
  position: absolute;
  top: 8px; right: 8px;
  gap: 4px;
}
.card:hover .card-actions { display: flex; }

.card-action-btn {
  width: 22px; height: 22px;
  border-radius: 4px;
  border: 0.5px solid var(--border2);
  background: var(--surface);
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.card-action-btn:hover { color: var(--text); border-color: var(--border2); }
.card-action-btn.del:hover { color: var(--red); border-color: rgba(255,107,107,0.4); }

.drop-zone {
  min-height: 60px;
  border: 1.5px dashed transparent;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: transparent;
}
.drop-zone.active {
  border-color: var(--blue);
  color: var(--blue);
  background: rgba(99,157,255,0.05);
}

/* ── BOTTOM BAR ── */
.bottombar {
  height: 60px;
  background: var(--surface);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
}

.cmd-input {
  flex: 1;
  background: var(--surface2);
  border: 0.5px solid var(--border);
  border-radius: 24px;
  padding: 9px 18px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.cmd-input:focus { border-color: rgba(201,168,76,0.45); }
.cmd-input::placeholder { color: var(--muted); }

.send-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 0.5px solid rgba(201,168,76,0.4);
  color: var(--gold2);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.send-btn:hover { background: rgba(201,168,76,0.28); }

/* ── MODAL ── */
.modal-backdrop {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop.open { display: flex; }

.modal {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: 14px;
  width: 100%;
  max-width: 480px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: modalIn 0.25s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--gold2);
  letter-spacing: 0.08em;
}

.modal-field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.modal-label {
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.modal-input, .modal-select, .modal-textarea {
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.modal-input:focus, .modal-select:focus, .modal-textarea:focus {
  border-color: rgba(201,168,76,0.45);
}
.modal-select option { background: var(--surface2); }
.modal-textarea { min-height: 80px; resize: vertical; }

.modal-row { display: flex; gap: 10px; }
.modal-row .modal-field { flex: 1; }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  padding-top: 4px;
}

.btn-cancel {
  padding: 9px 18px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  background: transparent;
  border: 0.5px solid var(--border2);
  color: var(--muted);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-cancel:hover { color: var(--text); border-color: var(--text); }

.btn-create {
  padding: 9px 20px;
  font-size: 12px;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.06em;
  font-weight: 600;
  background: var(--gold-dim);
  border: 0.5px solid rgba(201,168,76,0.45);
  color: var(--gold2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-create:hover { background: rgba(201,168,76,0.28); }

/* ── KYTHY PANEL ── */
.kythy-drawer {
  position: fixed;
  bottom: 60px; right: 0;
  width: 320px;
  max-height: 420px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-right: none;
  border-radius: 14px 0 0 14px;
  z-index: 500;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
.kythy-drawer.open { transform: translateX(0); }

.kythy-drawer-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.kythy-avatar {
  width: 28px; height: 28px;
  border: 1.5px solid var(--gold);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif;
  font-size: 10px; color: var(--gold); font-weight: 700;
}
.kythy-drawer-title {
  font-family: 'Cinzel', serif;
  font-size: 12px; font-weight: 600;
  color: var(--gold2); letter-spacing: 0.08em;
  flex: 1;
}
.kythy-close {
  background: transparent; border: none;
  color: var(--muted); font-size: 16px; cursor: pointer;
  padding: 4px;
}

.kythy-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}

.msg {
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  line-height: 1.55;
}
.msg.kythy {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--text);
  align-self: flex-start;
  max-width: 90%;
}
.msg.user {
  background: rgba(99,157,255,0.1);
  border: 0.5px solid rgba(99,157,255,0.2);
  color: var(--text);
  align-self: flex-end;
  max-width: 90%;
}
.msg.thinking {
  background: var(--surface2);
  border: 0.5px solid var(--border);
  color: var(--muted);
  font-style: italic;
  align-self: flex-start;
}

.kythy-input-row {
  display: flex;
  gap: 8px;
  padding: 10px;
  border-top: 0.5px solid var(--border);
  flex-shrink: 0;
}
.kythy-input {
  flex: 1;
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 18px;
  padding: 8px 14px;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  outline: none;
}
.kythy-input:focus { border-color: rgba(201,168,76,0.45); }
.kythy-send {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--gold-dim);
  border: 0.5px solid rgba(201,168,76,0.4);
  color: var(--gold2);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── PROJECT MODAL ── */
.color-swatches {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.swatch {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.15s;
}
.swatch.selected { border-color: white; }

/* ── TAGS ── */
.tag-work  { background: rgba(99,157,255,0.15); color: #7ab2ff; }
.tag-design{ background: rgba(201,168,76,0.15); color: var(--gold2); }
.tag-review{ background: rgba(78,228,168,0.15); color: var(--green); }
.tag-bug   { background: rgba(255,107,107,0.15); color: var(--red); }
.tag-plan  { background: rgba(240,163,90,0.15); color: var(--amber); }

/* ── EMPTY STATE ── */
.empty-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 30px 16px;
  color: var(--muted);
  font-size: 12px;
  opacity: 0.6;
}
.empty-col svg { opacity: 0.4; }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 0.5px solid var(--border2);
  border-radius: 24px;
  padding: 8px 18px;
  font-size: 12px;
  color: var(--text2);
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 2000;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PRIORITY COLORS ── */
.pri-high   { background: var(--red); }
.pri-medium { background: var(--amber); }
.pri-low    { background: var(--green); }

/* ── NOTE MODULE (placeholder) ── */
.note-canvas-wrap {
  display: none;
  position: fixed;
  inset: 56px 0 60px 0;
  z-index: 200;
  background: var(--bg);
  flex-direction: column;
}
.note-canvas-wrap.open { display: flex; }
.note-toolbar {
  height: 48px;
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  flex-shrink: 0;
}
.tool-btn {
  height: 32px; padding: 0 12px;
  border-radius: 6px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
}
.tool-btn.active, .tool-btn:hover { background: rgba(99,157,255,0.1); color: var(--blue); border-color: rgba(99,157,255,0.3); }
.tool-btn.gold.active, .tool-btn.gold:hover { background: var(--gold-dim); color: var(--gold2); border-color: rgba(201,168,76,0.35); }
#penColor {
  width: 24px; height: 24px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid var(--border2);
}
.pen-size-slider {
  width: 80px;
}
#noteCanvas {
  flex: 1;
  touch-action: none;
  display: block;
}
.note-close {
  margin-left: auto;
  padding: 0 14px;
  height: 32px;
  border-radius: 6px;
  border: 0.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
}
.note-close:hover { color: var(--text); }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-k">K</div>
      <span class="logo-text">KYTHROS</span>
    </div>

    <div class="project-selector" id="projectSelector">
      <!-- chips injected by JS -->
    </div>
    <button class="add-proj-btn" onclick="openProjectModal()" title="New Project">+</button>

    <button class="kythy-btn" onclick="toggleKythy()">
      <div class="kythy-pulse"></div>
      <span class="kythy-lbl">KYTHY</span>
    </button>
  </div>

  <!-- BOARD -->
  <div class="board" id="board">
    <!-- columns injected by JS -->
  </div>

  <!-- BOTTOM BAR -->
  <div class="bottombar">
    <input class="cmd-input" id="cmdInput" placeholder="Quick add task, or ask KYTHY anything…" />
    <button class="send-btn" onclick="handleCmd()">↑</button>
  </div>
</div>

<!-- KYTHY DRAWER -->
<div class="kythy-drawer" id="kythyDrawer">
  <div class="kythy-drawer-header">
    <div class="kythy-avatar">Ky</div>
    <span class="kythy-drawer-title">KYTHY</span>
    <button class="kythy-close" onclick="toggleKythy()">✕</button>
  </div>
  <div class="kythy-messages" id="kythyMessages">
    <div class="msg kythy">Hello. I'm KYTHY, your command agent inside KYTHROS. I can create tasks, reorganize your board, summarize your projects, and answer anything. What do you need?</div>
  </div>
  <div class="kythy-input-row">
    <input class="kythy-input" id="kythyInput" placeholder="Ask KYTHY…" onkeydown="if(event.key==='Enter')sendKythy()" />
    <button class="kythy-send" onclick="sendKythy()">↑</button>
  </div>
</div>

<!-- ADD TASK MODAL -->
<div class="modal-backdrop" id="taskModal">
  <div class="modal">
    <div class="modal-title">NEW TASK</div>
    <div class="modal-field">
      <div class="modal-label">TASK TITLE</div>
      <input class="modal-input" id="taskTitle" placeholder="What needs to be done?" />
    </div>
    <div class="modal-field">
      <div class="modal-label">NOTES</div>
      <textarea class="modal-textarea" id="taskNotes" placeholder="Additional details…"></textarea>
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <div class="modal-label">TAG</div>
        <select class="modal-select" id="taskTag">
          <option value="work">Work</option>
          <option value="design">Design</option>
          <option value="review">Review</option>
          <option value="plan">Plan</option>
          <option value="bug">Bug</option>
        </select>
      </div>
      <div class="modal-field">
        <div class="modal-label">PRIORITY</div>
        <select class="modal-select" id="taskPriority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="modal-field">
      <div class="modal-label">DUE DATE</div>
      <input class="modal-input" id="taskDue" type="date" />
    </div>
    <input type="hidden" id="taskColumn" value="todo" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('taskModal')">Cancel</button>
      <button class="btn-create" onclick="createTask()">CREATE TASK</button>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="modal-backdrop" id="projectModal">
  <div class="modal">
    <div class="modal-title">NEW PROJECT</div>
    <div class="modal-field">
      <div class="modal-label">PROJECT NAME</div>
      <input class="modal-input" id="projName" placeholder="e.g. Q2 Product Launch" />
    </div>
    <div class="modal-field">
      <div class="modal-label">COLOR</div>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('projectModal')">Cancel</button>
      <button class="btn-create" onclick="createProject()">CREATE PROJECT</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ──
const PROJ_COLORS = ['#639dff','#c9a84c','#4ee4a8','#f0a35a','#ff6b6b','#b97ef0','#59c4e0'];
let state = {
  projects: [
    { id: 'p1', name: 'Q2 Product Launch', color: '#639dff' },
    { id: 'p2', name: 'Office Renovation', color: '#f0a35a' },
  ],
  activeProject: 'p1',
  tasks: {
    p1: {
      todo: [
        { id:'t1', title:'Finalize landing page copy', tag:'design', priority:'high', due:'2026-04-10', notes:'' },
        { id:'t2', title:'QA testing round 2', tag:'review', priority:'medium', due:'2026-04-12', notes:'' },
        { id:'t3', title:'Stakeholder sign-off deck', tag:'plan', priority:'high', due:'2026-04-08', notes:'' },
      ],
      inprog: [
        { id:'t4', title:'API integration docs', tag:'work', priority:'medium', due:'2026-04-15', notes:'' },
        { id:'t5', title:'Design system update', tag:'design', priority:'low', due:'2026-04-18', notes:'' },
      ],
      done: [
        { id:'t6', title:'Kickoff meeting notes', tag:'plan', priority:'low', due:'', notes:'' },
        { id:'t7', title:'Competitor analysis', tag:'review', priority:'medium', due:'', notes:'' },
      ]
    },
    p2: {
      todo: [
        { id:'t8', title:'Get contractor bids', tag:'work', priority:'high', due:'2026-04-05', notes:'' },
      ],
      inprog: [
        { id:'t9', title:'Permits & approvals', tag:'plan', priority:'high', due:'2026-04-20', notes:'' },
      ],
      done: []
    }
  }
};

// ── INDEXEDDB PERSISTENCE ──
const DB_NAME = 'kythros_db', DB_VER = 1;
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('state')) d.createObjectStore('state');
    };
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = rej;
  });
}
function saveState() {
  if (!db) return;
  const tx = db.transaction('state', 'readwrite');
  tx.objectStore('state').put(JSON.stringify(state), 'main');
}
function loadState() {
  return new Promise(res => {
    if (!db) { res(); return; }
    const tx = db.transaction('state', 'readonly');
    const req = tx.objectStore('state').get('main');
    req.onsuccess = e => {
      if (e.target.result) {
        try { state = JSON.parse(e.target.result); } catch(err) {}
      }
      res();
    };
    req.onerror = () => res();
  });
}

// ── COLUMNS CONFIG ──
const COLS = [
  { id:'todo',   label:'TO DO',      dot:'#639dff', countBg:'rgba(99,157,255,0.15)', countClr:'#639dff' },
  { id:'inprog', label:'IN PROGRESS', dot:'#f0a35a', countBg:'rgba(240,163,90,0.15)', countClr:'#f0a35a' },
  { id:'done',   label:'DONE',        dot:'#4ee4a8', countBg:'rgba(78,228,168,0.15)', countClr:'#4ee4a8' },
];

// ── RENDER ──
function render() {
  renderProjectChips();
  renderBoard();
  saveState();
}

function renderProjectChips() {
  const sel = document.getElementById('projectSelector');
  sel.innerHTML = state.projects.map(p => `
    <button class="proj-chip ${p.id===state.activeProject?'active':''}"
      style="${p.id===state.activeProject?`border-color:${p.color}40;color:${p.color};background:${p.color}18`:''}"
      onclick="switchProject('${p.id}')">
      ${p.name}
    </button>
  `).join('');
}

function renderBoard() {
  const board = document.getElementById('board');
  const ptasks = state.tasks[state.activeProject] || { todo:[], inprog:[], done:[] };

  board.innerHTML = COLS.map(col => {
    const tasks = ptasks[col.id] || [];
    return `
    <div class="column" id="col-${col.id}"
      ondragover="onDragOver(event,'${col.id}')"
      ondrop="onDrop(event,'${col.id}')"
      ondragleave="onDragLeave(event)">
      <div class="col-header">
        <div class="col-dot" style="background:${col.dot}"></div>
        <span class="col-title">${col.label}</span>
        <span class="col-count" style="background:${col.countBg};color:${col.countClr}">${tasks.length}</span>
        <button class="col-add-btn" onclick="openTaskModal('${col.id}')">+</button>
      </div>
      <div class="cards-area" id="cards-${col.id}">
        ${tasks.length ? tasks.map(t => renderCard(t)).join('') : `
          <div class="empty-col">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
              <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M12 8v8"/>
            </svg>
            <span>Drop tasks here</span>
          </div>
        `}
        <div class="drop-zone" id="dz-${col.id}">Drop here</div>
      </div>
    </div>`;
  }).join('');

  // attach drag events to cards
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('dragstart', onDragStart);
    card.addEventListener('dragend', onDragEnd);
    // touch drag
    card.addEventListener('touchstart', touchStart, { passive: true });
    card.addEventListener('touchmove', touchMove, { passive: false });
    card.addEventListener('touchend', touchEnd);
  });
}

function renderCard(t) {
  const dueStr = formatDue(t.due);
  const dueClass = getDueClass(t.due);
  return `
  <div class="card" id="card-${t.id}" draggable="true" data-id="${t.id}">
    <div class="card-priority pri-${t.priority}"></div>
    <div style="padding-left:6px">
      <div class="card-title">${escHtml(t.title)}</div>
      <div class="card-meta">
        <span class="card-tag tag-${t.tag}">${t.tag.toUpperCase()}</span>
        ${dueStr ? `<span class="card-due ${dueClass}">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="2" width="10" height="9" rx="1.5"/><path d="M4 1v2M8 1v2M1 5h10"/>
          </svg>
          ${dueStr}
        </span>` : ''}
      </div>
    </div>
    <div class="card-actions">
      <button class="card-action-btn del" onclick="deleteTask('${t.id}',event)" title="Delete">✕</button>
    </div>
  </div>`;
}

// ── DUE DATE HELPERS ──
function formatDue(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  if (diff < 0) return `${Math.abs(diff)}d overdue`;
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff <= 7) return `${diff}d`;
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}
function getDueClass(due) {
  if (!due) return '';
  const d = new Date(due + 'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.round((d - now) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 2) return 'soon';
  return '';
}

// ── DRAG & DROP (mouse) ──
let dragId = null, dragFromCol = null;
function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  dragFromCol = findCol(dragId);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('active'));
}
function onDragOver(e, colId) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.getElementById('dz-'+colId).classList.add('active');
}
function onDragLeave(e) {
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('active'));
}
function onDrop(e, colId) {
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('active'));
  if (!dragId || dragFromCol === colId) return;
  moveTask(dragId, dragFromCol, colId);
  toast(`Moved to ${COLS.find(c=>c.id===colId).label}`);
}

// ── TOUCH DRAG ──
let touchCard = null, touchClone = null, touchFromCol = null, touchOffX = 0, touchOffY = 0;
function touchStart(e) {
  const card = e.currentTarget;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  touchOffX = touch.clientX - rect.left;
  touchOffY = touch.clientY - rect.top;
  touchCard = card;
  touchFromCol = findCol(card.dataset.id);
  touchClone = card.cloneNode(true);
  touchClone.style.cssText = `position:fixed;width:${rect.width}px;opacity:0.85;pointer-events:none;z-index:9999;border-radius:6px;top:${rect.top}px;left:${rect.left}px;`;
  document.body.appendChild(touchClone);
}
function touchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const touch = e.touches[0];
  touchClone.style.top = (touch.clientY - touchOffY) + 'px';
  touchClone.style.left = (touch.clientX - touchOffX) + 'px';
  document.querySelectorAll('.drop-zone').forEach(dz => {
    const r = dz.getBoundingClientRect();
    if (touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
      dz.classList.add('active');
    } else dz.classList.remove('active');
  });
}
function touchEnd(e) {
  if (!touchCard || !touchClone) return;
  const touch = e.changedTouches[0];
  let dropped = false;
  document.querySelectorAll('.drop-zone').forEach(dz => {
    const r = dz.getBoundingClientRect();
    if (!dropped && touch.clientX >= r.left && touch.clientX <= r.right && touch.clientY >= r.top && touch.clientY <= r.bottom) {
      const colId = dz.id.replace('dz-','');
      if (colId !== touchFromCol) {
        moveTask(touchCard.dataset.id, touchFromCol, colId);
        toast(`Moved to ${COLS.find(c=>c.id===colId).label}`);
      }
      dropped = true;
    }
  });
  touchClone.remove();
  touchClone = null;
  touchCard = null;
  document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('active'));
}

// ── TASK OPERATIONS ──
function findCol(taskId) {
  const ptasks = state.tasks[state.activeProject];
  for (const col of ['todo','inprog','done']) {
    if (ptasks[col].find(t => t.id === taskId)) return col;
  }
  return 'todo';
}
function moveTask(taskId, fromCol, toCol) {
  const ptasks = state.tasks[state.activeProject];
  const idx = ptasks[fromCol].findIndex(t => t.id === taskId);
  if (idx === -1) return;
  const [task] = ptasks[fromCol].splice(idx, 1);
  ptasks[toCol].push(task);
  render();
}
function deleteTask(taskId, e) {
  e.stopPropagation();
  const ptasks = state.tasks[state.activeProject];
  for (const col of ['todo','inprog','done']) {
    const idx = ptasks[col].findIndex(t => t.id === taskId);
    if (idx !== -1) { ptasks[col].splice(idx, 1); break; }
  }
  render();
  toast('Task deleted');
}

// ── MODALS ──
function openTaskModal(colId) {
  document.getElementById('taskColumn').value = colId;
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskNotes').value = '';
  document.getElementById('taskDue').value = '';
  document.getElementById('taskModal').classList.add('open');
  setTimeout(() => document.getElementById('taskTitle').focus(), 50);
}
function openProjectModal() {
  document.getElementById('projName').value = '';
  renderColorSwatches();
  document.getElementById('projectModal').classList.add('open');
  setTimeout(() => document.getElementById('projName').focus(), 50);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function renderColorSwatches() {
  document.getElementById('colorSwatches').innerHTML = PROJ_COLORS.map((c,i) => `
    <div class="swatch ${i===0?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectSwatch(this)"></div>
  `).join('');
}
function selectSwatch(el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}
function createTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { document.getElementById('taskTitle').focus(); return; }
  const colId = document.getElementById('taskColumn').value;
  const task = {
    id: 't' + Date.now(),
    title,
    tag: document.getElementById('taskTag').value,
    priority: document.getElementById('taskPriority').value,
    due: document.getElementById('taskDue').value,
    notes: document.getElementById('taskNotes').value,
  };
  if (!state.tasks[state.activeProject]) state.tasks[state.activeProject] = { todo:[], inprog:[], done:[] };
  state.tasks[state.activeProject][colId].push(task);
  closeModal('taskModal');
  render();
  toast('Task created');
}
function createProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) { document.getElementById('projName').focus(); return; }
  const selected = document.querySelector('.swatch.selected');
  const color = selected ? selected.dataset.color : PROJ_COLORS[0];
  const id = 'p' + Date.now();
  state.projects.push({ id, name, color });
  state.tasks[id] = { todo:[], inprog:[], done:[] };
  state.activeProject = id;
  closeModal('projectModal');
  render();
  toast(`Project "${name}" created`);
}
function switchProject(id) {
  state.activeProject = id;
  render();
}

// ── QUICK CMD BAR ──
function handleCmd() {
  const val = document.getElementById('cmdInput').value.trim();
  if (!val) return;
  // If it looks like a task title just add it
  if (!val.startsWith('/') && val.length < 80) {
    const task = { id:'t'+Date.now(), title:val, tag:'work', priority:'medium', due:'', notes:'' };
    if (!state.tasks[state.activeProject]) state.tasks[state.activeProject] = { todo:[], inprog:[], done:[] };
    state.tasks[state.activeProject].todo.push(task);
    document.getElementById('cmdInput').value = '';
    render();
    toast('Task added to To Do');
  } else {
    // Route to KYTHY
    document.getElementById('kythyInput').value = val;
    document.getElementById('cmdInput').value = '';
    openKythy();
    sendKythy();
  }
}
document.getElementById('cmdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleCmd();
});

// ── KYTHY AI ──
let kythyOpen = false;
function toggleKythy() {
  kythyOpen = !kythyOpen;
  document.getElementById('kythyDrawer').classList.toggle('open', kythyOpen);
  if (kythyOpen) setTimeout(() => document.getElementById('kythyInput').focus(), 300);
}
function openKythy() {
  kythyOpen = true;
  document.getElementById('kythyDrawer').classList.add('open');
}

async function sendKythy() {
  const input = document.getElementById('kythyInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';

  addMsg(msg, 'user');
  const thinking = addMsg('Thinking…', 'thinking');

  const proj = state.projects.find(p => p.id === state.activeProject);
  const ptasks = state.tasks[state.activeProject] || { todo:[], inprog:[], done:[] };
  const systemPrompt = `You are KYTHY, the AI agent inside KYTHROS — a personal life management OS. You are concise, sharp, and helpful. You know the user is a leader and project manager.

Current project: "${proj ? proj.name : 'None'}"
Tasks:
- To Do (${ptasks.todo.length}): ${ptasks.todo.map(t=>t.title).join(', ') || 'none'}
- In Progress (${ptasks.inprog.length}): ${ptasks.inprog.map(t=>t.title).join(', ') || 'none'}
- Done (${ptasks.done.length}): ${ptasks.done.map(t=>t.title).join(', ') || 'none'}

Keep answers under 80 words unless asked to elaborate. Be direct and proactive.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: msg }]
      })
    });
    const data = await resp.json();
    const reply = data.content?.map(b => b.text || '').join('') || 'Sorry, I couldn\'t reach the server.';
    thinking.textContent = reply;
    thinking.className = 'msg kythy';
  } catch (err) {
    thinking.textContent = 'Could not reach KYTHY. Check your connection.';
  }

  const msgs = document.getElementById('kythyMessages');
  msgs.scrollTop = msgs.scrollHeight;
}

function addMsg(text, type) {
  const msgs = document.getElementById('kythyMessages');
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  el.textContent = text;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

document.getElementById('kythyInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendKythy();
});

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ──
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── CLOSE MODALS ON BACKDROP CLICK ──
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});

// ── INIT ──
openDB().then(loadState).then(render);
</script>
</body>
</html>
