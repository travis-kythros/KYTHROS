let app, db, auth;

function loadFirebase() {
  app = firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
  auth.onAuthStateChanged(user => {
    if (user) {
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('importSection').style.display = 'block';
    }
  });
}

function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => alert('Sign in failed: ' + e.message));
}

function log(msg, cls) {
  const el = document.getElementById('log');
  el.style.display = 'block';
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function startImport() {
  const btn = document.getElementById('importBtn');
  btn.disabled = true;
  btn.textContent = 'Importing...';
  document.getElementById('progressWrap').style.display = 'block';

  let jobOK = 0, jobSkip = 0, jobFail = 0;
  let vendorOK = 0, vendorSkip = 0, vendorFail = 0;
  const total = JOBS.length + VENDORS.length;
  let done = 0;

  function updateProgress(label) {
    done++;
    const pct = Math.round(done / total * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = label;
  }

  log('Importing ' + JOBS.length + ' jobs...', 'info');

  for (let i = 0; i < JOBS.length; i++) {
    const j = JOBS[i];
    try {
      const existing = await db.collection('jobs').where('jtId','==',j.jtId).limit(1).get();
      if (!existing.empty) {
        jobSkip++;
        log('  skip: ' + j.jobNumber + ' ' + j.name, 'skip');
      } else {
        await db.collection('jobs').add({
          ...j,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        jobOK++;
        if (jobOK % 25 === 0) log('  ✓ ' + jobOK + ' jobs done...', 'ok');
      }
    } catch(e) {
      jobFail++;
      log('  ✗ ' + j.jobNumber + ': ' + e.message, 'err');
    }
    updateProgress('Jobs: ' + (i+1) + '/' + JOBS.length);
    if (i % 15 === 14) await new Promise(r => setTimeout(r, 200));
  }

  log('Jobs done — ' + jobOK + ' imported, ' + jobSkip + ' skipped, ' + jobFail + ' failed', 'info');
  log('Importing ' + VENDORS.length + ' vendors...', 'info');

  for (let i = 0; i < VENDORS.length; i++) {
    const v = VENDORS[i];
    try {
      const existing = await db.collection('vendors').where('jtId','==',v.jtId).limit(1).get();
      if (!existing.empty) {
        vendorSkip++;
        log('  skip: ' + v.name, 'skip');
      } else {
        await db.collection('vendors').add({
          ...v,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
        vendorOK++;
        log('  ✓ ' + v.name, 'ok');
      }
    } catch(e) {
      vendorFail++;
      log('  ✗ ' + v.name + ': ' + e.message, 'err');
    }
    updateProgress('Vendors: ' + (i+1) + '/' + VENDORS.length);
  }

  log('', '');
  log('✅ Complete! Jobs: ' + jobOK + ' imported, ' + jobSkip + ' skipped, ' + jobFail + ' failed', 'info');
  log('   Vendors: ' + vendorOK + ' imported, ' + vendorSkip + ' skipped, ' + vendorFail + ' failed', 'info');

  document.getElementById('successSection').style.display = 'block';
  document.getElementById('successDetail').textContent = jobOK + ' jobs + ' + vendorOK + ' vendors imported';
  document.getElementById('openBtn').style.display = 'block';
  document.getElementById('progressLabel').textContent = 'Done!';
}
